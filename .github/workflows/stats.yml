name: Update GitHub Stats

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Top Languages Card
        uses: stats-organization/github-readme-stats-action@v2.0.0
        with:
          card: top-langs
          options: username=josejorge&layout=compact&langs_count=6
          path: assets/top-langs.svg
          token: ${{ secrets.JOSEJORGE_TOKEN }}

      - name: Commit and Push SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/top-langs.svg

          git commit -m "Update GitHub stats" || echo "No changes to commit"

          git push
